name: CI

on:
  push:
    branches:
      - main
      - liqo/devops
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test
        env:
          DATABASE_URL: postgresql://liqo:liqo@127.0.0.1:5432/liqo_test
          JWT_SECRET: liqo-ci-secret
          DEFAULT_ORGANIZATION_ID: default-org-001
        run: npm run test:smoke

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:5000/api/v2
          NEXT_DIST_DIR: .next-build-ci
        run: npm run build:ci
