name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      backend_image_tag:
        description: Backend image tag to deploy
        required: false
        default: latest
      frontend_image_tag:
        description: Frontend image tag to deploy
        required: false
        default: latest
  push:
    branches:
      - main
    paths:
      - "k8s/**"
      - ".github/workflows/deploy-staging.yml"

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy Staging Overlay
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE_TAG: ${{ github.event.inputs.backend_image_tag || 'latest' }}
      FRONTEND_IMAGE_TAG: ${{ github.event.inputs.frontend_image_tag || 'latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.33.1

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.6.0

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 --decode > "${HOME}/.kube/config"
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Render staging manifest
        shell: bash
        run: |
          cd k8s/overlays/staging
          kustomize edit set image ghcr.io/gauravdograa/liqo-backend=ghcr.io/gauravdograa/liqo-backend:${BACKEND_IMAGE_TAG}
          kustomize edit set image ghcr.io/gauravdograa/liqo-frontend=ghcr.io/gauravdograa/liqo-frontend:${FRONTEND_IMAGE_TAG}
          kustomize build . > ../../../staging-manifest.yaml

      - name: Apply staging manifest
        run: kubectl apply -f staging-manifest.yaml

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/liqo-backend -n liqo-staging --timeout=180s
          kubectl rollout status deployment/liqo-frontend -n liqo-staging --timeout=180s
