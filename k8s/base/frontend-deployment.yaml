apiVersion: apps/v1
kind: Deployment
metadata:
  name: liqo-frontend
  namespace: liqo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liqo-frontend
  template:
    metadata:
      labels:
        app: liqo-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/liqo-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: http://liqo-backend:5000/api/v2
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: liqo-frontend
  namespace: liqo
spec:
  selector:
    app: liqo-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
