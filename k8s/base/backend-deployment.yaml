apiVersion: apps/v1
kind: Deployment
metadata:
  name: liqo-backend
  namespace: liqo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liqo-backend
  template:
    metadata:
      labels:
        app: liqo-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/liqo-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: liqo-backend-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: liqo-backend-secrets
                  key: JWT_SECRET
            - name: DEFAULT_ORGANIZATION_ID
              value: default-org-001
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: liqo-backend
  namespace: liqo
spec:
  selector:
    app: liqo-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
