apiVersion: apps/v1
kind: Deployment
metadata:
  name: liqo-frontend
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: frontend
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://liqo-staging.example.com/api/v2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
