services:
  postgres:
    image: postgres:16-alpine
    container_name: liqo-postgres
    environment:
      POSTGRES_DB: liqo
      POSTGRES_USER: liqo
      POSTGRES_PASSWORD: liqo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liqo -d liqo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liqo-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://liqo:liqo@postgres:5432/liqo
      JWT_SECRET: liqo-local-dev-secret
      DEFAULT_ORGANIZATION_ID: default-org-001
      DEMAND_SIGNAL_PROVIDER: historical_velocity
      ML_FORECAST_MODEL_NAME: liqo-demand-forecast-v1
      OPENAI_API_KEY: ""
      ML_FORECAST_API_URL: ""
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: liqo-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://backend:5000/api/v2
      N8N_ANALYTICS_CHAT_WEBHOOK_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: liqo-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.1.1
    container_name: liqo-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  grafana_data:
