services:
  postgres:
    image: postgres:16-alpine
    container_name: liqo-postgres
    environment:
      POSTGRES_DB: liqo_retail
      POSTGRES_USER: liqo
      POSTGRES_PASSWORD: liqo_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liqo -d liqo_retail"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: liqo-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://liqo:liqo_dev_password@postgres:5432/liqo_retail
      JWT_SECRET: change-me-for-local-dev
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v2
    container_name: liqo-frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v2
    ports:
      - "3000:3000"

volumes:
  postgres-data:

